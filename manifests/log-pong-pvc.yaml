apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: log-pong-pvc # name of the volume claim, this will be used in the deployment
  namespace: dwk-mooc
spec:
  storageClassName: longhorn # this is the name of the persistent volume we are claiming
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 128Mi
